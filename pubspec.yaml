name: ombor_hisobot
description: Ombor Hisobot - Warehouse Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  intl: ^0.19.0
  google_fonts: ^6.2.1
  fl_chart: ^0.67.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/ombor_hisobot_icon.png"
  adaptive_icon_background: "#1A3A5C"
  adaptive_icon_foreground: "assets/images/ombor_hisobot_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
